<!DOCTYPE html>
  <html lang="bs">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DND Solutions</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
            font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #fff;
            min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
}
    .logo { font-size: 3rem; font-weight: 800; color: #3b82f6; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.1rem; color: #94a3b8; margin-bottom: 3rem; }
    .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2rem; width: 220px; text-align: center; transition: transform 0.2s; cursor: pointer; }
    .card:hover { transform: translateY(-4px); border-color: #3b82f6; }
    .card .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
    .card p { font-size: 0.85rem; color: #64748b; }
    .status { margin-top: 3rem; font-size: 0.8rem; color: #475569; }
  </style>
    </head>
    <body>
      <div class="logo">DND Solutions</div>
      <div class="tagline">Sve za tvoj mali ili srednji biznis</div>
  <div class="cards">
    <div class="card"><div class="icon">👥</div><h3>Kadrovska evidencija</h3><p>Upravljanje zaposlenicima</p></div>
        <div class="card"><div class="icon">💰</div><h3>Obračun plata</h3><p>Automatski obračun i isplate</p></div>
    <div class="card"><div class="icon">📊</div><h3>Troškovi</h3><p>Evidencija i kontrola troškova</p></div>
  </div>
  <div class="status">© 2025 DND Solutions · dnd.ba</div>
</body>
</html>
